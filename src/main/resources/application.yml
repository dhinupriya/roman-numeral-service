spring:
  application:
    name: roman-numeral-service

  # Enable virtual threads for massive concurrency (Java 21)
  threads:
    virtual:
      enabled: true

  # Graceful shutdown — finish in-flight requests before stopping
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # Disable Whitelabel error page — GlobalExceptionHandler handles all errors
  mvc:
    throw-exception-if-no-handler-found: true

server:
  port: 8080
  shutdown: graceful

  # Response compression — significant savings for range queries (~150KB → ~20KB)
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json

  # Input size limits — defense against oversized requests
  tomcat:
    max-http-form-content-size: 10KB
  max-http-request-header-size: 8KB

# Application configuration
app:
  max-value: 3999
  max-range-size: 3999
  # API keys for authentication (production: use secrets manager)
  api-keys:
    - test-api-key-1
    - test-api-key-2

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      show-components: always
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.adobe.romannumeral: DEBUG
