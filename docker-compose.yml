# ============================================================================
# Docker Compose — Full Observability Stack
#
# Services:
#   roman-numeral-service (8080) — the application
#   prometheus (9090)            — metrics scraping
#   grafana (3000)               — dashboards + log exploration
#   loki (3100)                  — log aggregation
#   promtail                     — log collection from containers
#   cadvisor (8081)              — container metrics (CPU, memory, network)
#   node-exporter (9100)         — host metrics
#
# Usage:
#   docker compose up -d
#   curl -H "X-API-Key: test-api-key-1" localhost:8080/romannumeral?query=42
#   open http://localhost:3000  (Grafana, admin/admin)
# ============================================================================

services:
  # ---- Application ----
  roman-numeral-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---- Metrics ----
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ---- Dashboards + Logs UI ----
  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ---- Log Aggregation ----
  loki:
    image: grafana/loki:2.9.6
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ---- Log Collection ----
  promtail:
    image: grafana/promtail:2.9.6
    volumes:
      - ./docker/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ---- Container Metrics (CPU, memory, network) ----
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    ports:
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ---- Host Metrics ----
  node-exporter:
    image: prom/node-exporter:v1.8.0
    ports:
      - "9100:9100"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
