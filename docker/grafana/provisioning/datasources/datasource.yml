# Auto-provisioned Grafana datasources
# Grafana loads these at startup — no manual configuration needed

apiVersion: 1

datasources:
  # Prometheus — for app metrics, infra metrics, and k6 load test results
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  # Loki — for structured logs (shipped by Promtail)
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
