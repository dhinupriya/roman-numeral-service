# Prometheus scrape configuration
# Scrapes metrics from the app, cAdvisor (container metrics), and Node Exporter (host metrics)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Application metrics via Spring Actuator
  - job_name: 'roman-numeral-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['roman-numeral-service:8080']
        labels:
          application: 'roman-numeral-service'

  # Container metrics (CPU, memory, network, disk per container)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Host-level system metrics (CPU, memory, disk, network)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
